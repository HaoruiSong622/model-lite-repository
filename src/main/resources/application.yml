server:
  port: 8080

spring:
  application:
    name: model-lite-repository

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health
  endpoint:
    health:
      enabled: true

weight-import:
  job:
    image: file-copier:dev-placeholder
    namespace: default
    cpu-request: 500m
    memory-request: 512Mi
    storage-request: 1Gi
    suffix-whitelist: .safetensors,.bin,.pt,.pth,.onnx
