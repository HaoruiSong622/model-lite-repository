spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/modellite_dev
    username: dev_user
    password: dev_pass
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        allow:
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

logging:
  level:
    com.huawei.modellite: DEBUG

model-lite:
  upload:
    allowed-suffixes:
      - .safetensors
      - .bin
      - .pt
      - .pth
      - .onnx
      - .json
      - .txt
      - .model
      - .ckpt
      - .index
