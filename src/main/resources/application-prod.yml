spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/modellite
    username: ${DB_USER:modellite}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false

logging:
  level:
    com.huawei.modellite: INFO

model-lite:
  upload:
    allowed-suffixes:
      - .safetensors
      - .bin
      - .pt
      - .pth
      - .onnx
      - .json
      - .txt
      - .model
      - .ckpt
      - .index
